name: Bug report
description: Report a reproducible RFID Workflow problem using sanitized information only.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real RFID/NFC dumps, UIDs, keys, templates, backups, screenshots with card data, personal paths, or raw unsanitized logs.
  - type: input
    id: windows_version
    attributes:
      label: Windows version
      placeholder: "Example: Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Proxmark3 hardware
      placeholder: "Example: Proxmark3 Generic"
    validations:
      required: true
  - type: input
    id: client_version
    attributes:
      label: Client version
      placeholder: "Example: Iceman v..."
    validations:
      required: true
  - type: input
    id: firmware_version
    attributes:
      label: Firmware version
      placeholder: "Matching build, if known"
    validations:
      required: true
  - type: input
    id: technology
    attributes:
      label: Technology
      placeholder: "Example: Hitag S256"
    validations:
      required: true
  - type: dropdown
    id: workflow_type
    attributes:
      label: Workflow type
      options:
        - Read-only workflow
        - Write workflow
        - Detection or setup
        - Unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use a sanitized, authorized, reproducible scenario.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: sanitized_logs
    attributes:
      label: Sanitized logs only
      description: Remove all card data, UIDs, keys, paths, usernames, and secrets. Leave blank if uncertain.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm that this report contains sanitized information only and no personal RFID/NFC data.
          required: true
