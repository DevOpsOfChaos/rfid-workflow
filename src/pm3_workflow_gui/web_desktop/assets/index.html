<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RFID Workflow</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" data-app-shell>
      <header class="app-header">
        <div class="brand" aria-label="RFID Workflow">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>RFID Workflow</span>
        </div>
        <div id="deviceStatus" class="device-status is-checking" aria-live="polite">
          <span class="status-dot" aria-hidden="true"></span>
          Verbindung wird geprüft ...
        </div>
        <button class="icon-button" type="button" data-settings-toggle aria-label="Einstellungen öffnen" title="Einstellungen">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 8.4a3.6 3.6 0 1 0 0 7.2 3.6 3.6 0 0 0 0-7.2Zm8.1 3.6c0-.5 0-1-.1-1.4l2-1.5-2-3.5-2.4 1a8.9 8.9 0 0 0-2.3-1.4L15 2.6H9l-.3 2.6a8.9 8.9 0 0 0-2.3 1.4l-2.4-1-2 3.5 2 1.5a9.6 9.6 0 0 0 0 2.8l-2 1.5 2 3.5 2.4-1a8.9 8.9 0 0 0 2.3 1.4L9 21.4h6l.3-2.6a8.9 8.9 0 0 0 2.3-1.4l2.4 1 2-3.5-2-1.5c.1-.4.1-.9.1-1.4Z" />
          </svg>
        </button>
        <div class="settings-panel" data-settings-panel hidden>
          <button type="button" data-show-pm3-status>PM3-Status</button>
          <button type="button" data-refresh-connection>Verbindung prüfen</button>
          <button type="button" data-import-templates>Vorlagen importieren</button>
          <button type="button" data-advanced-tools>Erweiterte Werkzeuge anzeigen</button>
          <button type="button" data-about>Über</button>
        </div>
      </header>

      <aside class="side-nav" aria-label="Hauptnavigation">
        <nav class="primary-nav">
          <button class="nav-item is-active" type="button" data-view="read">Lesen</button>
          <button class="nav-item" type="button" data-view="write">Schreiben</button>
          <button class="nav-item" type="button" data-view="analysis">Analyse</button>
          <span class="nav-break" aria-hidden="true"></span>
          <button class="nav-item" type="button" data-view="templates">Vorlagen</button>
          <button class="nav-item" type="button" data-view="backups">Backups</button>
        </nav>
      </aside>

      <main id="appView" class="app-main" tabindex="-1"></main>

      <footer class="status-bar" aria-live="polite">
        <span class="status-bar-dot" aria-hidden="true"></span>
        <span id="statusText">Verbindung wird geprüft ...</span>
      </footer>
    </div>

    <div id="modalRoot" class="modal-root" hidden></div>
    <div id="toastRoot" class="toast-root" hidden></div>
    <script src="app.js"></script>
  </body>
</html>
